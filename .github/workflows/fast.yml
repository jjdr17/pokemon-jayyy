name: Pokemon Fast Lane
# Corsia preferenziale: solo negozi caldi (GameLife, Pokémon Center, TCGplayer,
# GameStop, Amazon) sui 3 set caldi. Attivata da cron-job.org ogni minuto.
on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: fast
  cancel-in-progress: false

jobs:
  fast:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Scansione veloce
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          MODE: fast
        run: |
          python3 -c "import requests" 2>/dev/null || pip install requests --quiet
          python3 monitor.py

      - name: Salva stato veloce
        run: |
          git config user.name "monitor-bot"
          git config user.email "bot@users.noreply.github.com"
          cp state-fast.json /tmp/ 2>/dev/null || true
          for i in 1 2 3; do
            git fetch origin main
            git reset --hard FETCH_HEAD
            cp /tmp/state-fast.json . 2>/dev/null || true
            git add state-fast.json
            git diff --cached --quiet && exit 0
            git commit -m "fast [skip ci]"
            git push && exit 0
            sleep $((i * 2))
          done
          echo "::error::push fallito dopo 3 tentativi — stato non salvato"
          exit 1
