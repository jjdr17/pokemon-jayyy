name: Pokemon Monitor
on:
  schedule:
    # backup: il trigger principale è cron-job.org ogni 5 minuti
    - cron: '2-57/5 * * * *'
  workflow_dispatch: {}    # attivato da cron-job.org

permissions:
  contents: write

concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Esegui monitor
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          python3 -c "import requests" 2>/dev/null || pip install requests --quiet
          python3 monitor.py

      - name: Salva stato
        run: |
          git config user.name "monitor-bot"
          git config user.email "bot@users.noreply.github.com"
          # metti da parte i file generati: sono la verità più recente
          mkdir -p /tmp/out
          cp state.json /tmp/out/ 2>/dev/null || true
          cp docs/index.html /tmp/out/ 2>/dev/null || true
          for i in 1 2 3; do
            # riallineati alla remota e riappoggia i file: zero conflitti possibili
            git fetch origin main
            git reset --hard FETCH_HEAD
            cp /tmp/out/state.json . 2>/dev/null || true
            mkdir -p docs && cp /tmp/out/index.html docs/ 2>/dev/null || true
            git add state.json docs/index.html
            git diff --cached --quiet && exit 0
            git commit -m "aggiorna stato e dashboard [skip ci]"
            git push && exit 0
            sleep $((i * 2))
          done
          echo "::error::push fallito dopo 3 tentativi — stato non salvato"
          exit 1
