name: Pokemon Monitor
on:
  schedule:
    - cron: '5 * * * *'   # ogni ora al minuto 5 (orario UTC)
  workflow_dispatch: {}    # permette di lanciarlo a mano dal tab Actions

permissions:
  contents: write

concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests

      - name: Esegui monitor
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python monitor.py

      - name: Salva stato
        run: |
          git config user.name "monitor-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "aggiorna stato [skip ci]"
          git push
