name: Pokemon Monitor
on:
  schedule:
    # backup: il trigger principale è cron-job.org ogni 5 minuti
    - cron: '2-57/5 * * * *'
  workflow_dispatch: {}    # attivato da cron-job.org

permissions:
  contents: write

concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Baseline dashboard
        run: |
          # scarica la dashboard pubblicata come base di confronto (evita riscritture inutili)
          git fetch origin gh-pages 2>/dev/null || true
          mkdir -p docs
          git show origin/gh-pages:index.html > docs/index.html 2>/dev/null || true

      - name: Esegui monitor
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          python3 -c "import requests" 2>/dev/null || pip install requests --quiet
          python3 monitor.py

      - name: Salva stato
        run: |
          git config user.name "monitor-bot"
          git config user.email "bot@users.noreply.github.com"
          mkdir -p /tmp/out
          cp state.json /tmp/out/ 2>/dev/null || true
          for i in 1 2 3; do
            git fetch origin main
            git reset --hard FETCH_HEAD
            cp /tmp/out/state.json . 2>/dev/null || true
            git add state.json
            git diff --cached --quiet && break
            git commit -m "aggiorna stato [skip ci]"
            git push && break
            sleep $((i * 2))
            [ $i -eq 3 ] && echo "::error::push fallito dopo 3 tentativi — stato non salvato" && exit 1
          done

      - name: Pubblica dashboard (ramo gh-pages, solo se cambiata)
        run: |
          NEW=docs/index.html
          [ -f "$NEW" ] || exit 0
          OLD=$(git show origin/gh-pages:index.html 2>/dev/null || echo "")
          [ "$OLD" = "$(cat $NEW)" ] && exit 0
          D=$(mktemp -d)
          cp "$NEW" "$D/index.html"
          touch "$D/.nojekyll"
          cd "$D"
          git init -q -b gh-pages
          git add -A
          git -c user.name=monitor-bot -c user.email=bot@users.noreply.github.com commit -qm "dashboard"
          git push -qf "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}" gh-pages
