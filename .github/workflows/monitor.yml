name: Pokemon Monitor
on:
  schedule:
    # ogni 5 minuti su minuti sfalsati (2,7,12...) — i minuti "tondi" sono congestionati
    # sui server GitHub e i run rischiano ritardi o salti
    - cron: '2-57/5 * * * *'
  workflow_dispatch: {}    # permette di lanciarlo a mano dal tab Actions

permissions:
  contents: write

concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests

      - name: Esegui monitor
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python monitor.py

      - name: Salva stato
        run: |
          git config user.name "monitor-bot"
          git config user.email "bot@users.noreply.github.com"
          git pull --rebase || true
          git add state.json docs/index.html
          git diff --cached --quiet || git commit -m "aggiorna stato e dashboard [skip ci]"
          git push
