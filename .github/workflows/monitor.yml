name: Pokemon Monitor
on:
  schedule:
    # backup: il trigger principale è cron-job.org ogni 5 minuti
    - cron: '2-57/5 * * * *'
  workflow_dispatch: {}    # attivato da cron-job.org

permissions:
  contents: write

concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Esegui monitor
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          python3 -c "import requests" 2>/dev/null || pip install requests --quiet
          python3 monitor.py

      - name: Salva stato
        run: |
          git config user.name "monitor-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json docs/index.html
          git diff --cached --quiet && exit 0
          git commit -m "aggiorna stato e dashboard [skip ci]"
          for i in 1 2 3; do
            git pull --rebase && git push && exit 0
            sleep $((i * 3))
          done
          echo "::error::push fallito dopo 3 tentativi — stato non salvato"
          exit 1
